version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: civicwatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: civicwatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - civicwatch_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d civicwatch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  civicwatch_postgres_data:
